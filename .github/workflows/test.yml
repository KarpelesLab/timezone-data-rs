name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (fmt, clippy, unit + differential)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all-targets
      - run: cargo test --doc

  data:
    name: Embedded data is up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      # Regenerate from zoneinfo.zip and fail if the committed output differs,
      # so the published crate always ships the current pre-parsed data.
      - run: cargo run -p xtask
      - run: git diff --exit-code -- src/generated.rs src/zone1970.tab src/iso3166.tab

  no_std:
    name: Bare-metal build (no_std, no alloc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabi
      # Building the library for a target with no std proves it never touches
      # std or alloc; any accidental use would fail to compile here.
      - run: cargo build -p timezone-data --lib --target thumbv7em-none-eabi
